<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --accent: #6366F1;
      --accent-2: #818CF8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
    }

    .container.dragging { cursor: grabbing; }

    /* The SVG icon glow */
    .icon-wrap {
      pointer-events: none;
      width: 88%;
      height: 88%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.75;
      filter: drop-shadow(0 0 5px color-mix(in srgb, var(--accent) 55%, transparent));
      transition: opacity 0.18s, filter 0.18s;
    }

    .icon-wrap svg { width: 100%; height: 100%; }
    .icon-wrap svg path,
    .icon-wrap svg rect { stroke: var(--accent-2); }

    /* Custom image: absolute, fills same area as icon-wrap */
    #customIconImg {
      display: none;
      position: absolute;
      top: 6%; left: 6%;
      width: 88%; height: 88%;
      object-fit: contain;
      pointer-events: none;
      opacity: 0.82;
      transition: opacity 0.18s;
    }

    .container:hover #customIconImg  { opacity: 1; }
    .container.drag-over #customIconImg { opacity: 1; }

    .container:hover .icon-wrap {
      opacity: 1;
      filter: drop-shadow(0 0 9px color-mix(in srgb, var(--accent) 85%, transparent));
    }

    .container.drag-over .icon-wrap {
      opacity: 1;
      filter:
        drop-shadow(0 0 10px var(--accent))
        drop-shadow(0 0 4px color-mix(in srgb, var(--accent-2) 90%, transparent));
    }

    /* Drag-over chip label */
    .label {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: color-mix(in srgb, var(--accent) 88%, transparent);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 9px;
      font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .container.drag-over .label { opacity: 1; }
  </style>
</head>
<body>
  <div class="container" id="tab">
    <div class="icon-wrap">
      <!--
        收纳盒图标：
        - 顶部拎手 (arch handle)
        - 盒盖 (lid)
        - 盒身 (body) + 横纵格线 (dividers)
        fill="none" → 中空透明
      -->
      <svg viewBox="0 0 56 66" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Handle arch -->
        <path
          d="M20 16 C20 8 36 8 36 16"
          stroke-width="2.4" stroke-linecap="round"
        />
        <!-- Lid (slightly wider than body) -->
        <rect x="3" y="16" width="50" height="9.5" rx="2.5"
          stroke-width="2.4"
        />
        <!-- Box body -->
        <rect x="5.5" y="25.5" width="45" height="34" rx="2"
          stroke-width="2.4"
        />
      </svg>
    </div>
    <img id="customIconImg" />
    <span class="label">松开导入</span>
  </div>

  <script>
    const tab = document.getElementById('tab')

    // ── Theme ──────────────────────────────────────────────────────────────
    function applyAccent({ accent, accent2 }) {
      document.documentElement.style.setProperty('--accent', accent)
      document.documentElement.style.setProperty('--accent-2', accent2)
    }
    // Apply immediately from URL params (no async flicker on first paint)
    const _dp = new URLSearchParams(window.location.search)
    if (_dp.get('accent')) applyAccent({ accent: _dp.get('accent'), accent2: _dp.get('accent2') || '#818CF8' })
    // Live updates when theme changes
    window.drawerApi?.onThemeChange(v => applyAccent(v))

    // ── IPC-based drag (mouse drag moves the window; doesn't block file drop) ──
    let dragStart = null   // { mx, my, wx, wy }
    let wasDragging = false

    tab.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return
      dragStart = { mx: e.screenX, my: e.screenY, wx: window.screenX, wy: window.screenY }
      wasDragging = false  // reset here so dblclick can check it
      e.preventDefault()
    })

    window.addEventListener('mousemove', (e) => {
      if (!dragStart) return
      const dx = e.screenX - dragStart.mx
      const dy = e.screenY - dragStart.my
      if (!wasDragging && Math.hypot(dx, dy) < 4) return
      wasDragging = true
      tab.classList.add('dragging')
      window.drawerApi?.move(dragStart.wx + dx, dragStart.wy + dy)
    })

    window.addEventListener('mouseup', (e) => {
      if (wasDragging && dragStart) {
        const dx = e.screenX - dragStart.mx
        const dy = e.screenY - dragStart.my
        window.drawerApi?.savePosition(dragStart.wx + dx, dragStart.wy + dy)
        tab.classList.remove('dragging')
      }
      dragStart = null
    })

    // ── Double-click → toggle main window (show if hidden, minimize if visible) ──
    tab.addEventListener('dblclick', () => {
      if (wasDragging) return
      window.drawerApi?.toggleMain()
    })

    // ── Right-click context menu ─────────────────────────────────────────
    tab.addEventListener('contextmenu', (e) => {
      e.preventDefault()
      window.drawerApi?.showContextMenu()
    })

    // ── File drag-drop ───────────────────────────────────────────────────
    tab.addEventListener('dragover', (e) => {
      e.preventDefault()
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'
      tab.classList.add('drag-over')
    })

    tab.addEventListener('dragleave', () => {
      tab.classList.remove('drag-over')
    })

    tab.addEventListener('drop', async (e) => {
      e.preventDefault()
      tab.classList.remove('drag-over')
      const paths = Array.from(e.dataTransfer?.files ?? [])
        .map(f => f.path)
        .filter(Boolean)
      if (paths.length) {
        await window.drawerApi?.notifyDrop(paths)
      }
    })

    // ── Custom icon ────────────────────────────────────────────────────────
    const iconWrap = document.querySelector('.icon-wrap')
    const imgEl    = document.getElementById('customIconImg')

    function applyCustomIcon(url) {
      if (url) {
        imgEl.src = url
        imgEl.style.display = 'block'
        iconWrap.style.display = 'none'
      } else {
        imgEl.style.display = 'none'
        iconWrap.style.display = ''
      }
    }

    // Load saved custom icon on startup
    window.drawerApi?.getCustomIcon().then(url => applyCustomIcon(url))
    // Listen for live changes (from settings panel)
    window.drawerApi?.onSetCustomIcon(url => applyCustomIcon(url))
  </script>
</body>
</html>
