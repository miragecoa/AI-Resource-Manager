<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --accent: #6366F1;
      --accent-2: #818CF8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .container.dragging {
      cursor: grabbing;
      transition: none;
    }

    .icon-wrap {
      pointer-events: none;
      width: 88%;
      height: 88%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.75;
      filter: drop-shadow(0 0 5px color-mix(in srgb, var(--accent) 55%, transparent));
      transition: opacity 0.18s, filter 0.18s;
    }

    .icon-wrap svg { width: 100%; height: 100%; }
    .icon-wrap svg path,
    .icon-wrap svg rect { stroke: var(--accent-2); }

    #customIconImg {
      display: none;
      position: absolute;
      top: 6%; left: 6%;
      width: 88%; height: 88%;
      object-fit: contain;
      pointer-events: none;
      opacity: 0.82;
      transition: opacity 0.18s;
    }

    .container:hover #customIconImg  { opacity: 1; }
    .container.drag-over #customIconImg { opacity: 1; }

    .container:hover .icon-wrap {
      opacity: 1;
      filter: drop-shadow(0 0 9px color-mix(in srgb, var(--accent) 85%, transparent));
    }

    .container.drag-over .icon-wrap {
      opacity: 1;
      filter:
        drop-shadow(0 0 10px var(--accent))
        drop-shadow(0 0 4px color-mix(in srgb, var(--accent-2) 90%, transparent));
    }

    /*
     * Peek strip — fixed sibling of .container, NEVER affected by container's transform.
     * Same size/position whether drawer is expanded (ghost) or collapsed (active).
     * Opacity is the only thing that changes.
     */
    #peekStrip {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      transition: opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .label {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: color-mix(in srgb, var(--accent) 88%, transparent);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 9px;
      font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .container.drag-over .label { opacity: 1; }
  </style>
</head>
<body>
  <div class="container" id="tab">
    <div class="icon-wrap">
      <svg viewBox="0 0 56 66" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 16 C20 8 36 8 36 16" stroke-width="2.4" stroke-linecap="round" />
        <rect x="3" y="16" width="50" height="9.5" rx="2.5" stroke-width="2.4" />
        <rect x="5.5" y="25.5" width="45" height="34" rx="2" stroke-width="2.4" />
      </svg>
    </div>
    <img id="customIconImg" />
    <span class="label">松开导入</span>
  </div>
  <div id="peekStrip"></div>

  <script>
    const tab      = document.getElementById('tab')
    const peekStrip = document.getElementById('peekStrip')

    // Strip dimensions — updated from settings or URL params
    let PEEK_PX    = 14   // thickness in px (the part that stays visible when collapsed)
    let STRIP_LEN  = 50   // length as % of the drawer dimension

    // Chevron SVGs that point toward the expand direction
    const CHEVRONS = {
      right:  `<svg width="6" height="11" viewBox="0 0 6 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 1L1 5.5L5 10" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      left:   `<svg width="6" height="11" viewBox="0 0 6 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1L5 5.5L1 10" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      top:    `<svg width="11" height="6" viewBox="0 0 11 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1L5.5 5L10 1" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      bottom: `<svg width="11" height="6" viewBox="0 0 11 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5L5.5 1L10 5" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    }

    // ── Theme ──────────────────────────────────────────────────────────────
    function applyAccent({ accent, accent2 }) {
      document.documentElement.style.setProperty('--accent', accent)
      document.documentElement.style.setProperty('--accent-2', accent2)
    }
    const _dp = new URLSearchParams(window.location.search)
    if (_dp.get('accent')) applyAccent({ accent: _dp.get('accent'), accent2: _dp.get('accent2') || '#818CF8' })
    window.drawerApi?.onThemeChange(v => applyAccent(v))

    // Init strip size from URL params (passed at window creation — zero flash)
    if (_dp.get('stripLen')) STRIP_LEN = parseInt(_dp.get('stripLen'))
    if (_dp.get('stripWid')) PEEK_PX   = parseInt(_dp.get('stripWid'))

    // ── Edge-hide mode ────────────────────────────────────────────────────
    let currentEdge = 'none'
    let peekLeaveTimer = null
    let isDragging = false

    // Position + size the peek strip for the given direction.
    // The strip occupies exactly the same area whether expanded (ghost) or collapsed (active).
    function positionStrip(dir) {
      Object.assign(peekStrip.style, {
        top: '', left: '', right: '', bottom: '',
        width: '', height: '',
        borderRadius: '',
        transform: '',
      })
      peekStrip.innerHTML = CHEVRONS[dir] ?? ''

      const lenPct = STRIP_LEN + '%'
      const offset = ((100 - STRIP_LEN) / 2) + '%'  // center the strip

      if (dir === 'right') {
        Object.assign(peekStrip.style, {
          right: '0', top: offset,
          width: PEEK_PX + 'px', height: lenPct,
          borderRadius: '6px 0 0 6px',
        })
      } else if (dir === 'left') {
        Object.assign(peekStrip.style, {
          left: '0', top: offset,
          width: PEEK_PX + 'px', height: lenPct,
          borderRadius: '0 6px 6px 0',
        })
      } else if (dir === 'top') {
        Object.assign(peekStrip.style, {
          top: '0', left: offset,
          width: lenPct, height: PEEK_PX + 'px',
          borderRadius: '0 0 6px 6px',
        })
      } else if (dir === 'bottom') {
        Object.assign(peekStrip.style, {
          bottom: '0', left: offset,
          width: lenPct, height: PEEK_PX + 'px',
          borderRadius: '6px 6px 0 0',
        })
      }
    }

    // applyEdge: configure state for new direction, show ghost strip, don't collapse yet
    function applyEdge(dir) {
      currentEdge = dir
      if (peekLeaveTimer) { clearTimeout(peekLeaveTimer); peekLeaveTimer = null }
      tab.style.transform = ''

      if (dir === 'none') {
        peekStrip.style.opacity = '0'
        peekStrip.innerHTML = ''
        return
      }

      positionStrip(dir)
      // Ghost: strip is visible at low opacity when drawer is expanded,
      // so the user always sees where it will collapse to.
      peekStrip.style.opacity = '0.22'
    }

    // Collapse: slide the container into the chosen edge; strip goes full opacity
    function collapseToEdge() {
      if (currentEdge === 'none') return
      if (currentEdge === 'right')  tab.style.transform = `translateX(calc(100% - ${PEEK_PX}px))`
      else if (currentEdge === 'left')   tab.style.transform = `translateX(calc(-100% + ${PEEK_PX}px))`
      else if (currentEdge === 'top')    tab.style.transform = `translateY(calc(-100% + ${PEEK_PX}px))`
      else if (currentEdge === 'bottom') tab.style.transform = `translateY(calc(100% - ${PEEK_PX}px))`
      peekStrip.style.opacity = '0.92'
    }

    // Expand: show the drawer, strip drops back to ghost opacity
    function expandFromEdge() {
      if (currentEdge === 'none') return
      tab.style.transform = ''
      peekStrip.style.opacity = '0.22'
    }

    // Settings changed edge direction
    window.drawerApi?.onSetEdge(dir => {
      applyEdge(dir)
      if (dir !== 'none') collapseToEdge()
    })

    // Settings changed strip size — re-apply strip positioning immediately
    window.drawerApi?.onSetStripSize(({ len, wid }) => {
      STRIP_LEN = len
      PEEK_PX   = wid
      if (currentEdge !== 'none') {
        positionStrip(currentEdge)
        // Re-collapse with updated PEEK_PX if currently hidden, else stay expanded
        if (tab.style.transform !== '') collapseToEdge()
      }
    })

    // Init from URL param (set at window creation — zero flash)
    const initialEdge = _dp.get('edge') ?? 'none'
    if (initialEdge !== 'none') {
      applyEdge(initialEdge)
      collapseToEdge()
    }

    tab.addEventListener('mouseenter', () => {
      if (currentEdge === 'none') return
      if (peekLeaveTimer) { clearTimeout(peekLeaveTimer); peekLeaveTimer = null }
      expandFromEdge()
    })

    tab.addEventListener('mouseleave', () => {
      if (currentEdge === 'none' || isDragging) return
      peekLeaveTimer = setTimeout(() => {
        collapseToEdge()
        peekLeaveTimer = null
      }, 400)
    })

    // ── IPC-based drag ────────────────────────────────────────────────────
    let mouseDownPos = null
    let wasDragging = false
    isDragging = false

    tab.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return
      mouseDownPos = { x: e.screenX, y: e.screenY }
      wasDragging = false
      isDragging = false
      e.preventDefault()
    })

    window.addEventListener('mousemove', (e) => {
      if (!mouseDownPos) return
      if (!isDragging) {
        const dx = e.screenX - mouseDownPos.x
        const dy = e.screenY - mouseDownPos.y
        if (Math.hypot(dx, dy) < 4) return
        isDragging = true
        wasDragging = true
        tab.classList.add('dragging')
        // Show drawer fully while dragging; keep ghost strip visible
        if (currentEdge !== 'none') {
          tab.style.transform = ''
          peekStrip.style.opacity = '0.22'
        }
        window.drawerApi?.dragStart()
      }
      window.drawerApi?.dragMove()
    })

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        window.drawerApi?.dragEnd()  // main saves position; edge setting preserved
        tab.classList.remove('dragging')
        // Re-collapse after drag if mouse isn't hovering
        if (currentEdge !== 'none') {
          setTimeout(() => {
            if (!tab.matches(':hover')) collapseToEdge()
          }, 500)
        }
      }
      mouseDownPos = null
      isDragging = false
    })

    // ── Double-click → toggle main window ────────────────────────────────
    tab.addEventListener('dblclick', () => {
      if (wasDragging) return
      window.drawerApi?.toggleMain()
    })

    // ── Right-click context menu ──────────────────────────────────────────
    tab.addEventListener('contextmenu', (e) => {
      e.preventDefault()
      window.drawerApi?.showContextMenu()
    })

    // ── File drag-drop ────────────────────────────────────────────────────
    tab.addEventListener('dragover', (e) => {
      e.preventDefault()
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'
      tab.classList.add('drag-over')
    })

    tab.addEventListener('dragleave', () => {
      tab.classList.remove('drag-over')
    })

    tab.addEventListener('drop', async (e) => {
      e.preventDefault()
      tab.classList.remove('drag-over')
      const paths = Array.from(e.dataTransfer?.files ?? [])
        .map(f => f.path)
        .filter(Boolean)
      if (paths.length) {
        await window.drawerApi?.notifyDrop(paths)
      }
    })

    // ── Custom icon ────────────────────────────────────────────────────────
    const iconWrap = document.querySelector('.icon-wrap')
    const imgEl    = document.getElementById('customIconImg')

    function applyCustomIcon(url) {
      if (url) {
        imgEl.src = url
        imgEl.style.display = 'block'
        iconWrap.style.display = 'none'
      } else {
        imgEl.style.display = 'none'
        iconWrap.style.display = ''
      }
    }

    window.drawerApi?.getCustomIcon().then(url => applyCustomIcon(url))
    window.drawerApi?.onSetCustomIcon(url => applyCustomIcon(url))
  </script>
</body>
</html>
