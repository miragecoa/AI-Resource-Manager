<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .tab {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 72px;
      background: rgba(99, 102, 241, 0.78);
      border-radius: 10px 0 0 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: width 0.18s ease, background 0.15s, box-shadow 0.15s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tab:hover {
      width: 44px;
      background: rgba(99, 102, 241, 0.95);
    }

    .tab.drag-over {
      width: 48px;
      background: rgba(99, 102, 241, 1);
      box-shadow: -4px 0 24px rgba(99, 102, 241, 0.7);
    }

    .icon {
      color: rgba(255,255,255,0.92);
      display: flex;
      flex-shrink: 0;
      pointer-events: none;
    }

    .label {
      color: rgba(255,255,255,0.85);
      font-size: 9px;
      font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .tab.drag-over .label { opacity: 1; }
    .tab:hover .label { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="tab" id="tab">
    <span class="icon">
      <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10h12M4 6h12M4 14h12"/>
      </svg>
    </span>
    <span class="label" id="label">松开导入</span>
  </div>

  <script>
    const tab = document.getElementById('tab')

    tab.addEventListener('click', () => {
      window.drawerApi?.openMain()
    })

    tab.addEventListener('contextmenu', (e) => {
      e.preventDefault()
      window.drawerApi?.showContextMenu()
    })

    tab.addEventListener('dragover', (e) => {
      e.preventDefault()
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'
      tab.classList.add('drag-over')
    })

    tab.addEventListener('dragleave', () => {
      tab.classList.remove('drag-over')
    })

    tab.addEventListener('drop', async (e) => {
      e.preventDefault()
      tab.classList.remove('drag-over')
      const paths = Array.from(e.dataTransfer?.files ?? [])
        .map(f => f.path)
        .filter(Boolean)
      if (paths.length) {
        await window.drawerApi?.notifyDrop(paths)
      }
    })
  </script>
</body>
</html>
