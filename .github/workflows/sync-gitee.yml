name: Sync Release to Gitee

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push code to Gitee
        run: |
          git remote add gitee https://leyradc:${{ secrets.GITEE_TOKEN }}@gitee.com/leyradc/ai-resource-manager.git
          git push gitee HEAD:main --force
          git push gitee refs/tags/${{ github.event.release.tag_name }} --force

      - name: Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          RELEASE_ID=$(python3 -c "
          import json, os, sys, urllib.request, urllib.error
          owner = 'leyradc'
          repo = 'ai-resource-manager'
          token = os.environ['GITEE_TOKEN']
          tag = os.environ['RELEASE_TAG']
          # 先删除已有同名 release（幂等）
          try:
              get_req = urllib.request.Request(f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases/tags/{tag}?access_token={token}')
              with urllib.request.urlopen(get_req) as r:
                  old = json.loads(r.read())
              if old and isinstance(old, dict) and old.get('id'):
                  del_req = urllib.request.Request(f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases/{old[\"id\"]}?access_token={token}', method='DELETE')
                  urllib.request.urlopen(del_req)
          except Exception:
              pass
          # 创建新 release
          data = json.dumps({
              'access_token': token,
              'tag_name': tag,
              'name': os.environ['RELEASE_NAME'],
              'body': os.environ.get('RELEASE_BODY', ''),
              'prerelease': False,
              'target_commitish': 'main'
          }).encode()
          req = urllib.request.Request(
              f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases',
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as r:
              body = r.read()
          resp = json.loads(body)
          if not resp or not isinstance(resp, dict) or not resp.get('id'):
              print(f'ERROR: unexpected response: {body[:500]}', file=sys.stderr)
              sys.exit(1)
          print(resp['id'])
          ")
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

      - name: Download & Upload assets to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: |
          python3 -c "
          import json, os, subprocess
          assets = json.loads(os.environ['ASSETS_JSON'])
          release_id = os.environ['RELEASE_ID']
          token = os.environ['GITEE_TOKEN']
          for a in assets:
              name = a['name']
              url = a['browser_download_url']
              print(f'Downloading {name}...')
              subprocess.run(['curl', '-L', '-o', name, url], check=True)
              print(f'Uploading {name} to Gitee release {release_id}...')
              size_mb = os.path.getsize(name) / 1024 / 1024
              print(f'File size: {size_mb:.1f} MB')
              result = subprocess.run([
                  'curl', '-v', '-X', 'POST',
                  f'https://gitee.com/api/v5/repos/leyradc/ai-resource-manager/releases/{release_id}/attach_files',
                  '-F', f'access_token={token}',
                  '-F', f'file=@{name}'
              ], capture_output=True, text=True)
              print('STDOUT:', result.stdout)
              print('STDERR:', result.stderr[-2000:])
              print('Return code:', result.returncode)
          "
