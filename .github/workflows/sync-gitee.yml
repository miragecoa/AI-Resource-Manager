name: Sync Release to Gitee

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push code to Gitee
        run: |
          git remote add gitee https://leyradc:${{ secrets.GITEE_TOKEN }}@gitee.com/leyradc/ai-resource-manager.git
          git push gitee HEAD:main --force
          git push gitee refs/tags/${{ github.event.release.tag_name }} --force

      - name: Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 -c "
          import json, os, sys, urllib.request, urllib.error
          owner = 'leyradc'
          repo = 'ai-resource-manager'
          token = os.environ['GITEE_TOKEN']
          tag = os.environ['RELEASE_TAG']
          # 先删除已有同名 release（幂等）
          try:
              get_req = urllib.request.Request(f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases/tags/{tag}?access_token={token}')
              with urllib.request.urlopen(get_req) as r:
                  old = json.loads(r.read())
              if old and isinstance(old, dict) and old.get('id'):
                  del_req = urllib.request.Request(f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases/{old[\"id\"]}?access_token={token}', method='DELETE')
                  urllib.request.urlopen(del_req)
          except Exception:
              pass
          # 创建新 release
          data = json.dumps({
              'access_token': token,
              'tag_name': tag,
              'name': os.environ['RELEASE_NAME'],
              'body': os.environ.get('RELEASE_BODY', ''),
              'prerelease': False,
              'target_commitish': 'main'
          }).encode()
          req = urllib.request.Request(
              f'https://gitee.com/api/v5/repos/{owner}/{repo}/releases',
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as r:
              body = r.read()
          resp = json.loads(body)
          if not resp or not isinstance(resp, dict) or not resp.get('id'):
              print(f'ERROR: unexpected response: {body[:500]}', file=sys.stderr)
              sys.exit(1)
          print(f'Gitee release created: id={resp[\"id\"]}')
          print('Binary upload skipped — run locally: node scripts/upload-gitee.js')
          "
